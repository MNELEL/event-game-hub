name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Downgrade Capacitor to v6
        run: npm install @capacitor/core@6 @capacitor/android@6 @capacitor/cli@6

      - name: Build Vite
        run: npm run build

      - name: Capacitor add & sync
        run: |
          npx cap add android
          npx cap sync android

      - name: Add Netzfree CA certificate (if exists)
        run: |
          if [ -f "public/root_ca_bundle.crt" ]; then
            mkdir -p android/app/src/main/res/raw
            cp public/root_ca_bundle.crt android/app/src/main/res/raw/netzfree_ca.crt
            mkdir -p android/app/src/main/res/xml
            cat > android/app/src/main/res/xml/network_security_config.xml << 'XMLEOF'
<?xml version="1.0" encoding="utf-8"?>
<network-security-config>
    <base-config>
        <trust-anchors>
            <certificates src="system" />
            <certificates src="@raw/netzfree_ca" />
        </trust-anchors>
    </base-config>
</network-security-config>
XMLEOF
            sed -i 's/<application/<application android:networkSecurityConfig="@xml\/network_security_config"/' android/app/src/main/AndroidManifest.xml
            echo "Netzfree CA certificate added"
          else
            echo "No CA certificate found, skipping"
          fi

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
